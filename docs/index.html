<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>記事保存</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.3rem; margin-bottom: 20px; color: #222; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
      height: 160px;
      resize: vertical;
      margin-bottom: 14px;
    }
    textarea:focus { border-color: #4285f4; }
    button {
      width: 100%;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3367d6; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-error { background: #fdecea; color: #c62828; }
    .status-info { background: #e3f2fd; color: #1565c0; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- トークン設定画面（初回のみ） -->
  <div id="setup" class="card" style="display:none">
    <h1>🔑 初期設定</h1>
    <p style="font-size:0.85rem;color:#555;margin-bottom:16px">GitHub Personal Access Tokenを入力してください。<br>ブラウザに保存され、次回以降は不要です。</p>
    <label>GitHub PAT</label>
    <textarea id="pat-input" style="height:80px;font-family:monospace;font-size:0.85rem" placeholder="github_pat_..."></textarea>
    <button onclick="saveToken()">保存して始める</button>
  </div>

  <!-- メイン画面 -->
  <div id="main" class="card" style="display:none">
    <h1>📰 記事保存</h1>
    <label>URL（1行に1つ、複数可）</label>
    <textarea id="urls" placeholder="https://example.com/article1&#10;https://example.com/article2"></textarea>
    <button id="btn" onclick="save()">Google Documentに保存</button>
    <div id="status"></div>
    <p style="margin-top:12px;text-align:right">
      <a href="#" onclick="localStorage.removeItem('gh_pat');showSetup();return false" style="font-size:0.8rem;color:#aaa">トークンを変更</a>
    </p>
  </div>

  <script>
    const REPO = "smith-wq903/article-saver";

    function getToken() {
      return localStorage.getItem("gh_pat");
    }

    function showSetup() {
      document.getElementById("main").style.display = "none";
      document.getElementById("setup").style.display = "block";
    }

    function saveToken() {
      const token = document.getElementById("pat-input").value.trim();
      if (!token) { alert("トークンを入力してください"); return; }
      localStorage.setItem("gh_pat", token);
      document.getElementById("setup").style.display = "none";
      document.getElementById("main").style.display = "block";
    }

    async function save() {
      const token = getToken();
      if (!token) { showSetup(); return; }

      const urls = document.getElementById("urls").value
        .split("\n").map(s => s.trim()).filter(s => s);
      if (!urls.length) { alert("URLを入力してください"); return; }

      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>送信中...';
      status.style.display = "none";

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/dispatches`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            event_type: "save_articles",
            client_payload: { urls }
          })
        });

        if (res.status === 204) {
          status.className = "status-ok";
          status.textContent = `✅ ${urls.length}件のURLを送信しました。1〜2分後にGoogle Documentに反映されます。`;
          document.getElementById("urls").value = "";
        } else {
          const data = await res.json();
          throw new Error(data.message || `HTTP ${res.status}`);
        }
      } catch (e) {
        status.className = "status-error";
        status.textContent = `❌ エラー: ${e.message}`;
      }

      status.style.display = "block";
      btn.disabled = false;
      btn.innerHTML = "Google Documentに保存";
    }

    // トークン未設定なら設定画面、設定済みならメイン画面を表示
    if (!getToken()) {
      showSetup();
    } else {
      document.getElementById("main").style.display = "block";
    }
  </script>
</body>
</html>
